basePath: /
definitions:
  models.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.Book:
    properties:
      author:
        type: string
      created_at:
        type: string
      genre:
        type: string
      id:
        type: integer
      title:
        type: string
      total_pages:
        type: integer
    type: object
  models.CreateBookRequest:
    properties:
      author:
        type: string
      genre:
        type: string
      title:
        type: string
      total_pages:
        type: integer
    type: object
  models.CreateDragonRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  models.Dragon:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      user_id:
        type: integer
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.FocusTimerRequest:
    properties:
      book_id:
        type: integer
      minutes:
        type: integer
      pages_read:
        type: integer
    type: object
  models.FocusTimerResponse:
    properties:
      coins_earned:
        type: integer
      total_coins:
        type: integer
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  models.User:
    properties:
      books:
        items:
          $ref: '#/definitions/models.UserBookSummary'
        type: array
      coins:
        type: integer
      created_at:
        type: string
      dragon_color:
        type: string
      dragon_id:
        type: integer
      dragon_name:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  models.UserBookResponse:
    properties:
      author:
        type: string
      current_page:
        type: integer
      genre:
        type: string
      id:
        type: integer
      read_count:
        type: integer
      title:
        type: string
      total_pages:
        type: integer
    type: object
  models.UserBookSummary:
    properties:
      id:
        type: integer
      read_count:
        type: integer
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the Book Dragon project.
  title: Book Dragon API
  version: "1.0"
paths:
  /auth/me:
    get:
      description: Get the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /books:
    get:
      description: Get all books for the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.UserBookResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user's books
      tags:
      - books
    post:
      consumes:
      - application/json
      description: Find and add a book to the user's books, or create it if not found.
        Increments read count if already added.
      parameters:
      - description: Book info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Book'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add a book
      tags:
      - books
  /dragon:
    get:
      description: Get the authenticated user's dragon
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Dragon'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user's dragon
      tags:
      - dragons
    post:
      consumes:
      - application/json
      description: Create a dragon for the authenticated user
      parameters:
      - description: Dragon Creation Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateDragonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Dragon'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new dragon
      tags:
      - dragons
  /focus_timer_complete:
    post:
      consumes:
      - application/json
      description: Add coins based on minutes read
      parameters:
      - description: Focus Timer Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.FocusTimerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.FocusTimerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Complete a focus timer session
      tags:
      - users
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: User Login Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User login
      tags:
      - users
  /logout:
    post:
      description: Logout a user (client-side token deletion required)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - users
  /register:
    post:
      consumes:
      - application/json
      description: Create a new user account and log the user in
      parameters:
      - description: User Registration Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Register a new user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
