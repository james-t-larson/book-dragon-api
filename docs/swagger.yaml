basePath: /
definitions:
  book-dragon_internal_models.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/book-dragon_internal_models.User'
    type: object
  book-dragon_internal_models.CreateDragonRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  book-dragon_internal_models.Dragon:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      user_id:
        type: integer
    type: object
  book-dragon_internal_models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  book-dragon_internal_models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  book-dragon_internal_models.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  book-dragon_internal_models.User:
    properties:
      created_at:
        type: string
      dragon_color:
        type: string
      dragon_id:
        type: integer
      dragon_name:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the Book Dragon project.
  title: Book Dragon API
  version: "1.0"
paths:
  /auth/me:
    get:
      description: Get the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book-dragon_internal_models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /dragon:
    get:
      description: Get the authenticated user's dragon
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book-dragon_internal_models.Dragon'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user's dragon
      tags:
      - dragons
    post:
      consumes:
      - application/json
      description: Create a dragon for the authenticated user
      parameters:
      - description: Dragon Creation Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/book-dragon_internal_models.CreateDragonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book-dragon_internal_models.Dragon'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new dragon
      tags:
      - dragons
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: User Login Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/book-dragon_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/book-dragon_internal_models.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      summary: User login
      tags:
      - users
  /logout:
    post:
      description: Logout a user (client-side token deletion required)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - users
  /register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: User Registration Info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/book-dragon_internal_models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/book-dragon_internal_models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/book-dragon_internal_models.ErrorResponse'
      summary: Register a new user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
